services:
  db:
    image: postgres:17
    container_name: trading_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: trading_platform
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      
volumes:
  pgdata:
